name: Move LeetCode Solutions

on:
  workflow_dispatch:
  push:
    paths:
      - '[0-9][0-9][0-9][0-9]-*/**'
      - README.md
      - stats.json

permissions:
  contents: write

jobs:
  move-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Move LeetCode solutions
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p LeetCode/TOP100

          found=0
          for d in [0-9][0-9][0-9][0-9]-*; do
            if [ -d "$d" ]; then
              target="LeetCode/TOP100/$d"
              mkdir -p "$target"
              cp -a "$d"/. "$target"/
              rm -rf "$d"
              echo "Moved $d to $target"
              found=1
            fi
          done

          if [ "$found" -eq 0 ]; then
            echo "No matching directories found to move"
          fi

          if [ -f README.md ]; then
            sed -i -E 's#(tree/[^/)]+/)([0-9]{4}-)#\1LeetCode/TOP100/\2#g' README.md
          fi

      - name: Commit & Push changes
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git add -A
            git commit -m "chore: Move LeetCode solutions to LeetCode folder"
            git push
          else
            echo "No changes to commit"
          fi
